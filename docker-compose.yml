services:
  mysql:
    image: mysql:8.4
    container_name: hentor-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: hentor_vegetables
      MYSQL_ROOT_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-change-me-local-mysql}
    ports:
      - "127.0.0.1:3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hentor-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command: >
      sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then
        redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD";
      else
        redis-server --appendonly yes;
      fi'
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$${REDIS_PASSWORD}\" ]; then redis-cli -a \"$${REDIS_PASSWORD}\" ping; else redis-cli ping; fi"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: hentor-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${SPRING_MINIO_ACCESS_KEY:-hentor_local_minio}
      MINIO_ROOT_PASSWORD: ${SPRING_MINIO_SECRET_KEY:-change-me-local-minio}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: hentor-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${SPRING_MINIO_ACCESS_KEY:-hentor_local_minio}
      MINIO_ROOT_PASSWORD: ${SPRING_MINIO_SECRET_KEY:-change-me-local-minio}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb --ignore-existing local/hentor-assets;
      mc anonymous set download local/hentor-assets;
      "

volumes:
  mysql_data:
  redis_data:
  minio_data:

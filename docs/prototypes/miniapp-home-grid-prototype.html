<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>03 小程序 / 首页（预订）新版网格原型</title>
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        align-items: center;
        background: #d9d9d9;
        display: flex;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          "Microsoft YaHei", sans-serif;
        justify-content: center;
        margin: 0;
        min-height: 100vh;
      }

      .phone {
        background: #f5faf2;
        border-radius: 28px;
        box-shadow: 0 24px 64px rgb(18 45 28 / 14%);
        height: 844px;
        overflow: hidden;
        position: relative;
        width: 390px;
      }

      .status {
        align-items: center;
        display: flex;
        height: 46px;
        justify-content: space-between;
        padding: 12px 20px 0;
      }

      .status__time {
        color: #111;
        font-size: 13px;
        font-weight: 700;
      }

      .status__pill {
        align-items: center;
        background: #fff;
        border: 1px solid #dce7dc;
        border-radius: 999px;
        display: flex;
        gap: 9px;
        height: 30px;
        justify-content: center;
        width: 62px;
      }

      .status__dot {
        background: #111;
        border-radius: 50%;
        height: 4px;
        width: 4px;
      }

      .status__circle {
        border: 3px solid #111;
        border-radius: 50%;
        height: 12px;
        width: 12px;
      }

      .header {
        align-items: center;
        display: flex;
        height: 10px;
        justify-content: flex-end;
        padding: 0 20px;
      }

      .package {
        background: #073f25;
        border-radius: 18px;
        color: #fff;
        height: 132px;
        margin: 10px 20px 0;
        overflow: hidden;
        padding: 16px;
      }

      .package__top {
        align-items: center;
        display: flex;
        justify-content: space-between;
      }

      .package__name,
      .package__label {
        color: #ffd66b;
        font-size: 13px;
        font-weight: 800;
        line-height: 18px;
      }

      .package__cutoff {
        background: #fff4d5;
        border-radius: 999px;
        color: #8a5a00;
        font-size: 12px;
        font-weight: 900;
        line-height: 16px;
        padding: 7px 16px;
      }

      .package__stats {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(3, 1fr);
        margin-top: 16px;
      }

      .package__stat {
        background: rgb(255 255 255 / 9%);
        border: 1px solid rgb(255 255 255 / 14%);
        border-radius: 16px;
        padding: 10px 8px;
      }

      .package__number {
        color: #fff;
        font-size: 28px;
        font-weight: 900;
        line-height: 32px;
      }

      .package__stat-label {
        color: rgb(255 255 255 / 72%);
        font-size: 12px;
        font-weight: 800;
        line-height: 16px;
        margin-top: 3px;
      }

      .address__title {
        color: #0a1d11;
        flex: 1;
        font-size: 14px;
        font-weight: 800;
        line-height: 20px;
        margin-left: 9px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .address__action {
        color: #1f8f4f;
        font-size: 13px;
        font-weight: 800;
        margin-left: 8px;
      }

      .grid-head {
        align-items: baseline;
        display: flex;
        gap: 8px;
        margin: 16px 20px 8px;
      }

      .grid-head__title {
        color: #07160d;
        font-size: 20px;
        font-weight: 900;
        line-height: 24px;
      }

      .grid-head__meta {
        color: #6c786f;
        flex: 1;
        font-size: 12px;
        line-height: 18px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .dish-grid {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        justify-content: center;
        width: 100%;
      }

      .dish-card {
        align-items: center;
        background: #fffdf8;
        border: 2px solid #dceed7;
        border-radius: 18px;
        display: flex;
        flex-direction: column;
        height: 132px;
        overflow: hidden;
        padding: 10px 6px 6px;
        width: 100%;
      }

      .dish-card__photo {
        background: #f4faef;
        border-radius: 12px;
        height: 42px;
        object-fit: cover;
        width: 60px;
      }

      .dish-card__name {
        color: #050e08;
        font-size: 16px;
        font-weight: 900;
        line-height: 22px;
        margin-top: 5px;
        max-width: 94px;
        overflow: hidden;
        text-align: center;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .dish-card__actions {
        align-items: center;
        display: flex;
        gap: 2px;
        justify-content: space-between;
        margin-top: 6px;
        width: 100%;
      }

      .step {
        align-items: center;
        border-radius: 999px;
        display: flex;
        font-size: 16px;
        font-weight: 900;
        height: 26px;
        justify-content: center;
        line-height: 26px;
        width: 26px;
      }

      .step--minus {
        background: #fff;
        border: 1.5px solid #55b840;
        color: #245a22;
      }

      .step--plus {
        background: #63bf3d;
        color: #fff;
      }

      .dish-card__weight {
        color: #050e08;
        flex: 1;
        font-size: 15px;
        font-weight: 900;
        line-height: 20px;
        min-width: 42px;
        text-align: center;
        white-space: nowrap;
      }

      .basket {
        background: #fff;
        border-radius: 18px;
        bottom: 70px;
        box-shadow: 0 10px 30px rgb(15 36 24 / 12%);
        height: 126px;
        left: 16px;
        padding: 13px 16px 14px;
        position: absolute;
        width: 358px;
      }

      .basket__address {
        align-items: center;
        border-bottom: 1px solid #e9f0e8;
        display: flex;
        gap: 10px;
        padding-bottom: 10px;
      }

      .basket__pin {
        align-items: center;
        border: 2px solid #1f8f4f;
        border-radius: 50%;
        color: #1f8f4f;
        display: flex;
        flex: 0 0 22px;
        font-size: 12px;
        font-weight: 900;
        height: 22px;
        justify-content: center;
      }

      .basket__address-action {
        background: #eef8f0;
        border-radius: 999px;
        color: #1f8f4f;
        font-size: 13px;
        font-weight: 900;
        line-height: 18px;
        padding: 7px 14px;
      }

      .basket__main {
        align-items: center;
        display: flex;
        gap: 12px;
        justify-content: space-between;
        padding-top: 12px;
      }

      .basket__title {
        color: #07160d;
        font-size: 16px;
        font-weight: 900;
        line-height: 22px;
        white-space: nowrap;
      }

      .basket__meta {
        color: #66756d;
        font-size: 12px;
        line-height: 18px;
        margin-top: 4px;
        max-width: 174px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .basket__cta {
        align-items: center;
        background: #1f8f4f;
        border-radius: 999px;
        color: #fff;
        display: flex;
        flex: 0 0 132px;
        font-size: 15px;
        font-weight: 900;
        height: 42px;
        justify-content: center;
      }

      .tabbar {
        align-items: flex-start;
        background: #fff;
        border-top: 1px solid #ebf0eb;
        bottom: 0;
        display: flex;
        height: 70px;
        justify-content: center;
        left: 0;
        position: absolute;
        right: 0;
      }

      .tab {
        align-items: center;
        color: #9aaa9e;
        display: flex;
        flex-direction: column;
        font-size: 12px;
        font-weight: 700;
        gap: 4px;
        padding-top: 10px;
        width: 144px;
      }

      .tab--active {
        color: #1f8f4f;
      }

      .tab__icon {
        font-size: 20px;
        line-height: 22px;
      }
    </style>
  </head>
  <body>
    <main class="phone" aria-label="小程序首页预订新版网格原型">
      <section class="status">
        <div class="status__time">9:41</div>
        <div class="status__pill" aria-label="微信小程序菜单">
          <span class="status__dot"></span>
          <span class="status__dot"></span>
          <span class="status__circle"></span>
        </div>
      </section>

      <section class="header">
      </section>

      <section class="package">
        <div class="package__top">
          <div class="package__name">8斤周套餐</div>
          <div class="package__cutoff">18:00 截单</div>
        </div>
        <div class="package__stats" aria-label="周套餐次数">
          <div class="package__stat">
            <div class="package__label">总次数</div>
            <div class="package__number">8</div>
            <div class="package__stat-label">本周可预订</div>
          </div>
          <div class="package__stat">
            <div class="package__label">已用</div>
            <div class="package__number">1</div>
            <div class="package__stat-label">已完成预订</div>
          </div>
          <div class="package__stat">
            <div class="package__label">剩余</div>
            <div class="package__number">7</div>
            <div class="package__stat-label">可继续使用</div>
          </div>
        </div>
      </section>

      <section class="grid-head">
        <div class="grid-head__title">今日菜品</div>
        <div class="grid-head__meta">按 + 选择斤数，可随时减回</div>
      </section>

      <section class="dish-grid" aria-label="今日可预订菜品">
        <article class="dish-card">
          <img
            alt="菠菜"
            class="dish-card__photo"
            src="./assets/spinach.jpg"
          />
          <div class="dish-card__name">菠菜</div>
          <div class="dish-card__actions">
            <div class="step step--minus">-</div>
            <div class="dish-card__weight">1斤</div>
            <div class="step step--plus">+</div>
          </div>
        </article>
        <article class="dish-card">
          <img
            alt="生菜"
            class="dish-card__photo"
            src="./assets/lettuce.jpg"
          />
          <div class="dish-card__name">生菜</div>
          <div class="dish-card__actions">
            <div class="step step--minus">-</div>
            <div class="dish-card__weight">0斤</div>
            <div class="step step--plus">+</div>
          </div>
        </article>
        <article class="dish-card">
          <img
            alt="小白菜"
            class="dish-card__photo"
            src="./assets/cabbage.jpg"
          />
          <div class="dish-card__name">小白菜</div>
          <div class="dish-card__actions">
            <div class="step step--minus">-</div>
            <div class="dish-card__weight">0.5斤</div>
            <div class="step step--plus">+</div>
          </div>
        </article>
        <article class="dish-card">
          <img
            alt="空心菜"
            class="dish-card__photo"
            src="./assets/mixed-greens.jpg"
          />
          <div class="dish-card__name">空心菜</div>
          <div class="dish-card__actions">
            <div class="step step--minus">-</div>
            <div class="dish-card__weight">0斤</div>
            <div class="step step--plus">+</div>
          </div>
        </article>
        <article class="dish-card">
          <img
            alt="番茄"
            class="dish-card__photo"
            src="./assets/tomato.jpg"
          />
          <div class="dish-card__name">番茄</div>
          <div class="dish-card__actions">
            <div class="step step--minus">-</div>
            <div class="dish-card__weight">1斤</div>
            <div class="step step--plus">+</div>
          </div>
        </article>
        <article class="dish-card">
          <img
            alt="黄瓜"
            class="dish-card__photo"
            src="./assets/cucumber.jpg"
          />
          <div class="dish-card__name">黄瓜</div>
          <div class="dish-card__actions">
            <div class="step step--minus">-</div>
            <div class="dish-card__weight">0斤</div>
            <div class="step step--plus">+</div>
          </div>
        </article>
      </section>

      <section class="basket">
        <div class="basket__address">
          <div class="basket__pin">⌖</div>
          <div class="address__title">配送地址：莲花小区 3栋 602</div>
          <div class="basket__address-action">切换</div>
        </div>
        <div class="basket__main">
          <div>
            <div class="basket__title">已选 3 样菜 · 2.5斤</div>
            <div class="basket__meta">截单前可修改</div>
          </div>
          <div class="basket__cta">提交预订</div>
        </div>
      </section>

      <nav class="tabbar" aria-label="底部导航">
        <div class="tab tab--active">
          <div class="tab__icon">⌂</div>
          <div>首页</div>
        </div>
        <div class="tab">
          <div class="tab__icon">♙</div>
          <div>我的</div>
        </div>
      </nav>
    </main>
  </body>
</html>
